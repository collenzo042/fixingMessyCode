<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Basic Plan — Pricing</title>
    <link rel="stylesheet" href="pricing-page.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>Pricing</h1>
    </header>

    <main class="site-main">
      <article class="pricing" data-pricing-card>
        <h2 class="title">Basic Plan</h2>
        <p class="price">$9.99 / month</p>

        <ul class="features">
          <li>1 GB Storage</li>
          <li>Basic Support</li>
          <li>All Core Features</li>
        </ul>

        <button type="button" class="btn" data-trial-button>Start Trial</button>
        <p
          class="trial-message"
          id="trial-message"
          hidden
          role="status"
          aria-live="polite"
        ></p>
      </article>
    </main>

    <footer class="site-footer">
      <p>© <span data-year></span> Your Company</p>
    </footer>

    <script src="pricing-page.js" defer></script>
  </body>
</html>
